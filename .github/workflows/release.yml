name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install Python for the pinned model fetch
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pinned local-AI resources
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/models
          key: qwen2.5-1.5b-q4-k-m-${{ runner.os }}-6a1a2eb6-c0382117

      - name: Fetch and verify pinned local-AI resources
        run: python scripts/fetch_llm_resources.py

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'log-parser v__VERSION__'
          releaseBody: |
            Pre-built installers for Windows, macOS (Apple Silicon and Intel), and Linux.
            See the assets below to download and install.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
