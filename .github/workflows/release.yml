name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install Node for frontend regression tests
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify the direct AI search flow
        run: |
          node --check frontend/app.js
          node --test frontend/tests/guided-query-flow.test.cjs

      - name: Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install Python for the pinned model fetch
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pinned local-AI resources
        uses: actions/cache@v4
        with:
          path: src-tauri/resources/models
          key: offline-ai-models-${{ runner.os }}-6a1a2eb6-c0382117-53aa5117-be50c362-953f9c0d

      - name: Fetch and verify pinned local-AI resources
        run: python scripts/fetch_llm_resources.py

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'log-parser v__VERSION__'
          releaseBody: |
            Pre-built installers for Windows and macOS (Apple Silicon and Intel).
            See the assets below to download and install.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
